<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play</title>
    <style>
      body { margin: 0; padding: 0; }
      iframe {
        width: 100%;
        height: 100vh;
        border: none;
      }
      #backBtn {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 9999;
        background: #3d3560;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-family: 'Ubuntu', sans-serif;
        opacity: 0.85;
        transition: opacity 0.2s;
      }
      #backBtn:hover { opacity: 1; }
    </style>
  </head>
  <body>
    <button id="backBtn" onclick="window.location.href='/'">← Back</button>
    <iframe id="gameFrame"></iframe>
    <script>
      var serverUrl1 = "https://gms.parcoil.com";
      const queryString = window.location.search;
      const urlParams = new URLSearchParams(queryString);
      const gameUrl = urlParams.get("gameurl");
      if (!gameUrl) {
        alert("Game URL not provided!");
        window.location.href = '/lakers19/'
      } else {
        document.getElementById("gameFrame").src = serverUrl1 + "/" + gameUrl;
      }
    </script>
  </body>
</html>
